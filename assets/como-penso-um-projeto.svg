<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="p-glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="p-flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <text x="500" y="30" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#64748b">
    [ como_penso_um_projeto() ] — fluxo de execução estratégica
  </text>

  <line x1="100" y1="135" x2="900" y2="135" stroke="#1e293b" stroke-width="2"/>
  <line x1="100" y1="135" x2="900" y2="135" stroke="url(#p-flow)" stroke-width="3" stroke-dasharray="60 940">
    <animate attributeName="stroke-dashoffset" values="0;-1000" dur="6s" repeatCount="indefinite"/>
  </line>

  <g transform="translate(100 135)">
    <circle r="32" fill="#0a0a0a" stroke="#10b981" stroke-width="2"/>
    <circle r="32" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0">
      <animate attributeName="r" values="32;42;32" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <g transform="translate(-9 -8)" stroke="#10b981" stroke-width="2" fill="none">
      <circle cx="6" cy="6" r="6"/>
      <line x1="11" y1="11" x2="16" y2="16" stroke-linecap="round"/>
    </g>
    <text y="55" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748b">01</text>
    <text y="78" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#10b981" filter="url(#p-glow)">ENTENDER</text>
    <text y="98" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94a3b8">contexto · dor · objetivo</text>
    <text y="115" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94a3b8">do cliente</text>
  </g>

  <g transform="translate(300 135)">
    <circle r="32" fill="#0a0a0a" stroke="#10b981" stroke-width="2"/>
    <circle r="32" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0">
      <animate attributeName="r" values="32;42;32" dur="3s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <g transform="translate(-10 -10)" stroke="#10b981" stroke-width="2" fill="none">
      <rect x="0" y="0" width="20" height="20" rx="2"/>
      <line x1="4" y1="6" x2="16" y2="6"/>
      <line x1="4" y1="10" x2="12" y2="10"/>
      <line x1="4" y1="14" x2="14" y2="14"/>
    </g>
    <text y="55" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748b">02</text>
    <text y="78" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#10b981" filter="url(#p-glow)">PLANEJAR</text>
    <text y="98" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94a3b8">escopo · arquitetura</text>
    <text y="115" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94a3b8">stack · timeline</text>
  </g>

  <g transform="translate(500 135)">
    <circle r="32" fill="#0a0a0a" stroke="#fbbf24" stroke-width="2.5"/>
    <circle r="32" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0">
      <animate attributeName="r" values="32;42;32" dur="3s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <g transform="translate(-12 -8)" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#fbbf24">
      <text x="0" y="12">&lt;/&gt;</text>
    </g>
    <text y="55" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748b">03</text>
    <text y="78" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#fbbf24" filter="url(#p-glow)">DESENVOLVER</text>
    <text y="98" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94a3b8">código · testes</text>
    <text y="115" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94a3b8">iteração rápida</text>
  </g>

  <g transform="translate(700 135)">
    <circle r="32" fill="#0a0a0a" stroke="#10b981" stroke-width="2"/>
    <circle r="32" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0">
      <animate attributeName="r" values="32;42;32" dur="3s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <g transform="translate(0 0)" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -10 8 L 0 -12 L 10 8 L 0 4 Z" fill="#10b981" fill-opacity="0.2"/>
      <line x1="-5" y1="14" x2="5" y2="14"/>
    </g>
    <text y="55" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748b">04</text>
    <text y="78" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#10b981" filter="url(#p-glow)">ENTREGAR</text>
    <text y="98" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94a3b8">deploy · onboarding</text>
    <text y="115" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94a3b8">implantação</text>
  </g>

  <g transform="translate(900 135)">
    <circle r="32" fill="#0a0a0a" stroke="#10b981" stroke-width="2"/>
    <circle r="32" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0">
      <animate attributeName="r" values="32;42;32" dur="3s" begin="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" begin="2.4s" repeatCount="indefinite"/>
    </circle>
    <g stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M -12 0 A 12 12 0 1 1 0 12">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      </path>
      <path d="M -2 -2 L -12 0 L -10 -10" stroke-linejoin="round">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      </path>
    </g>
    <text y="55" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748b">05</text>
    <text y="78" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#10b981" filter="url(#p-glow)">EVOLUIR</text>
    <text y="98" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94a3b8">métricas · feedback</text>
    <text y="115" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94a3b8">próximas iterações</text>
  </g>

  <g fill="#10b981" opacity="0.7">
    <polygon points="195,131 205,135 195,139"/>
    <polygon points="395,131 405,135 395,139"/>
    <polygon points="595,131 605,135 595,139"/>
    <polygon points="795,131 805,135 795,139"/>
  </g>

  <g font-family="ui-monospace, monospace" font-size="11" fill="#64748b" opacity="0.6">
    <text x="500" y="250" text-anchor="middle">tecnologia · estratégia · experiência</text>
    <text x="500" y="266" text-anchor="middle">$ resolver &gt; produzir</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="m-glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="m-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="m-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <text x="500" y="34" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#64748b">
    [ modos_de_atuacao() ] — onde tecnologia encontra estratégia
  </text>

  <g>
    <rect x="30" y="60" width="470" height="130" rx="10" fill="url(#m-bg)" stroke="#10b981" stroke-width="1.5"/>
    <g fill="none" stroke="#fbbf24" stroke-width="2">
      <path d="M 30 80 L 30 60 L 50 60"/>
      <path d="M 480 60 L 500 60 L 500 80"/>
    </g>
    <text x="55" y="92" font-family="ui-monospace, monospace" font-size="11" fill="#64748b">01 / Frontend & Web</text>
    <text x="55" y="128" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="#10b981" filter="url(#m-glow)">DESENVOLVIMENTO WEB</text>
    <text x="55" y="155" font-family="ui-monospace, monospace" font-size="12" fill="#e2e8f0">Next.js • React • TypeScript • Tailwind</text>
    <text x="55" y="174" font-family="ui-monospace, monospace" font-size="11" fill="#94a3b8">Interfaces responsivas, performance e UX estratégica.</text>

    <g transform="translate(420 125)">
      <text font-family="ui-monospace, monospace" font-size="32" fill="#10b981" filter="url(#m-glow)" opacity="0.9">
        <tspan x="0" y="0">&lt;/&gt;</tspan>
      </text>
      <rect x="-6" y="-30" width="3" height="36" fill="#fbbf24">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <g>
    <rect x="510" y="60" width="460" height="130" rx="10" fill="url(#m-bg)" stroke="#10b981" stroke-width="1.5"/>
    <g fill="none" stroke="#fbbf24" stroke-width="2">
      <path d="M 510 80 L 510 60 L 530 60"/>
      <path d="M 950 60 L 970 60 L 970 80"/>
    </g>
    <text x="535" y="92" font-family="ui-monospace, monospace" font-size="11" fill="#64748b">02 / Intelligence & Flow</text>
    <text x="535" y="128" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="#10b981" filter="url(#m-glow)">IA &amp; AUTOMAÇÃO</text>
    <text x="535" y="155" font-family="ui-monospace, monospace" font-size="12" fill="#e2e8f0">OpenAI • n8n • Make • Zapier • Webhooks</text>
    <text x="535" y="174" font-family="ui-monospace, monospace" font-size="11" fill="#94a3b8">Agentes, prompts estratégicos e fluxos integrados.</text>

    <g transform="translate(900 125)">
      <circle cx="0" cy="0" r="6" fill="#fbbf24"/>
      <circle cx="-20" cy="-15" r="4" fill="#10b981"/>
      <circle cx="20" cy="-15" r="4" fill="#10b981"/>
      <circle cx="-20" cy="15" r="4" fill="#10b981"/>
      <circle cx="20" cy="15" r="4" fill="#10b981"/>
      <g stroke="#10b981" stroke-width="1.2" opacity="0.6">
        <line x1="0" y1="0" x2="-20" y2="-15"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></line>
        <line x1="0" y1="0" x2="20" y2="-15"><animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/></line>
        <line x1="0" y1="0" x2="-20" y2="15"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/></line>
        <line x1="0" y1="0" x2="20" y2="15"><animate attributeName="opacity" values="1;0.5;1" dur="1.8s" repeatCount="indefinite"/></line>
      </g>
    </g>
  </g>

  <g>
    <rect x="30" y="210" width="470" height="130" rx="10" fill="url(#m-bg)" stroke="#10b981" stroke-width="1.5"/>
    <g fill="none" stroke="#fbbf24" stroke-width="2">
      <path d="M 30 230 L 30 210 L 50 210"/>
      <path d="M 480 210 L 500 210 L 500 230"/>
    </g>
    <text x="55" y="242" font-family="ui-monospace, monospace" font-size="11" fill="#64748b">03 / Product & Platform</text>
    <text x="55" y="278" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="#10b981" filter="url(#m-glow)">PRODUTO DIGITAL</text>
    <text x="55" y="305" font-family="ui-monospace, monospace" font-size="12" fill="#e2e8f0">SaaS • Multi-tenant • Checkout • Onboarding</text>
    <text x="55" y="324" font-family="ui-monospace, monospace" font-size="11" fill="#94a3b8">Plataformas escaláveis com implantação assistida.</text>

    <g transform="translate(420 275)">
      <rect x="-22" y="-22" width="44" height="44" rx="5" fill="none" stroke="#10b981" stroke-width="2"/>
      <rect x="-15" y="-15" width="30" height="6" rx="1" fill="#10b981" opacity="0.4">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="-15" y="-5" width="22" height="4" rx="1" fill="#fbbf24" opacity="0.8"/>
      <rect x="-15" y="3" width="28" height="4" rx="1" fill="#10b981" opacity="0.4"/>
      <rect x="-15" y="11" width="18" height="4" rx="1" fill="#10b981" opacity="0.4"/>
    </g>
  </g>

  <g>
    <rect x="510" y="210" width="460" height="130" rx="10" fill="url(#m-bg)" stroke="#10b981" stroke-width="1.5"/>
    <g fill="none" stroke="#fbbf24" stroke-width="2">
      <path d="M 510 230 L 510 210 L 530 210"/>
      <path d="M 950 210 L 970 210 L 970 230"/>
    </g>
    <text x="535" y="242" font-family="ui-monospace, monospace" font-size="11" fill="#64748b">04 / Strategy & People</text>
    <text x="535" y="278" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="#10b981" filter="url(#m-glow)">ESTRATÉGIA &amp; GESTÃO</text>
    <text x="535" y="305" font-family="ui-monospace, monospace" font-size="12" fill="#e2e8f0">People Analytics • Business Partner • Processos</text>
    <text x="535" y="324" font-family="ui-monospace, monospace" font-size="11" fill="#94a3b8">Visão de negócio, indicadores e tomada de decisão.</text>

    <g transform="translate(900 275)">
      <circle cx="0" cy="0" r="24" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
      <circle cx="0" cy="0" r="16" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
      <circle cx="0" cy="0" r="8" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="3" fill="#fbbf24">
        <animate attributeName="r" values="2;5;2" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="24" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0">
        <animate attributeName="r" values="8;30;8" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
